<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pro Teleprompter</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg-color: #111;
      --text-color: #ffffff;
      --accent-color: #00ff88;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
    body, html { height: 100%; background: var(--bg-color); color: var(--text-color); overflow: hidden; }
    
    /* App Layout Split Screen */
    .app-container { display: flex; flex-direction: column; height: 1005; height: 100vh; }
    
    /* Controls Panel */
    .control-panel { background: #1a1a1a; padding: 15px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; border-bottom: 2px solid #2a2a2a; z-index: 10; }
    textarea { flex: 1; min-width: 250px; height: 60px; background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; font-size: 16px; resize: none; }
    .btn { background: #333; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .btn:active { transform: scale(0.95); }
    .btn-play { background: var(--accent-color); color: #000; }
    .control-group { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #aaa; }
    input[type="range"] { accent-color: var(--accent-color); cursor: pointer; }

    /* Prompter Display Area */
    .prompter-window { flex: 1; overflow-y: scroll; position: relative; padding: 40vh 5% 50vh 5%; scroll-behavior: auto; }
    .prompter-window::-webkit-scrollbar { display: none; } /* Hide Scrollbars */
    .prompter-text { font-size: 48px; font-weight: 700; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; transition: font-size 0.1s; }
    
    /* Center Guidance Line Overlay */
    .reading-marker { position: absolute; left: 0; right: 0; top: 45vh; height: 2px; background: rgba(0, 255, 136, 0.3); pointer-events: none; }
    .reading-marker::before { content: '►'; position: absolute; left: 10px; top: -10px; color: var(--accent-color); font-size: 18px; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="control-panel" id="controls">
    <textarea id="scriptInput" placeholder="Type or paste your script here... Real-time changes allowed!"></textarea>
    
    <button class="btn btn-play" id="playBtn">START</button>
    <button class="btn" id="resetBtn">RESET</button>
    
    <div class="control-group">
      <label>Speed</label>
      <input type="range" id="speedCtrl" min="1" max="100" value="25">
    </div>
    <div class="control-group">
      <label>Font Size</label>
      <input type="range" id="sizeCtrl" min="24" max="90" value="48">
    </div>
  </div>

  <div class="prompter-window" id="scrollWindow">
    <div class="reading-marker"></div>
    <div class="prompter-text" id="prompterDisplay"></div>
  </div>
</div>

<script>
  const scriptInput = document.getElementById('scriptInput');
  const prompterDisplay = document.getElementById('prompterDisplay');
  const scrollWindow = document.getElementById('scrollWindow');
  const playBtn = document.getElementById('playBtn');
  const resetBtn = document.getElementById('resetBtn');
  const speedCtrl = document.getElementById('speedCtrl');
  const sizeCtrl = document.getElementById('sizeCtrl');

  let isScrolling = false;
  let scrollInterval = null;
  let currentScrollY = 0;

  // 1. Permanent State Protection (Local Storage Initialization)
  if (localStorage.getItem('savedScript')) {
    scriptInput.value = localStorage.getItem('savedScript');
    prompterDisplay.textContent = localStorage.getItem('savedScript');
  }
  if (localStorage.getItem('savedSpeed')) speedCtrl.value = localStorage.getItem('savedSpeed');
  if (localStorage.getItem('savedSize')) {
    sizeCtrl.value = localStorage.getItem('savedSize');
    prompterDisplay.style.fontSize = sizeCtrl.value + 'px';
  }

  // 2. Continuous/On-The-Fly Dynamic Updates
  scriptInput.addEventListener('input', () => {
    prompterDisplay.textContent = scriptInput.value;
    localStorage.setItem('savedScript', scriptInput.value);
  });
  
  speedCtrl.addEventListener('input', () => {
    localStorage.setItem('savedSpeed', speedCtrl.value);
  });

  sizeCtrl.addEventListener('input', () => {
    prompterDisplay.style.fontSize = sizeCtrl.value + 'px';
    localStorage.setItem('savedSize', sizeCtrl.value);
  });

  // 3. Smooth Prompter Scrolling Engine
  function autoScroll() {
    if (!isScrolling) return;
    // Map exponential curve so lower values allow hyper-fine creeping speed adjustments
    const speed = Math.pow(speedCtrl.value / 100, 2) * 8; 
    currentScrollY += speed;
    scrollWindow.scrollTop = currentScrollY;
    
    // Auto-stop mechanics if text finishes
    if (scrollWindow.scrollTop >= (scrollWindow.scrollHeight - scrollWindow.clientHeight)) {
      stopPrompting();
    } else {
      requestAnimationFrame(autoScroll);
    }
  }

  function startPrompting() {
    isScrolling = true;
    playBtn.textContent = "PAUSE";
    playBtn.style.background = "#ff3b30";
    currentScrollY = scrollWindow.scrollTop; // capture manual adjustments
    requestAnimationFrame(autoScroll);
  }

  function stopPrompting() {
    isScrolling = false;
    playBtn.textContent = "START";
    playBtn.style.background = "var(--accent-color)";
  }

  playBtn.addEventListener('click', () => {
    if (isScrolling) stopPrompting(); else startPrompting();
  });

  resetBtn.addEventListener('click', () => {
    stopPrompting();
    currentScrollY = 0;
    scrollWindow.scrollTop = 0;
  });

  // Track physical manual interventions natively
  scrollWindow.addEventListener('touchstart', () => { if(isScrolling) stopPrompting(); });

  // 4. Register PWA Offline Engine
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.log("SW registration failed", err));
  }
</script>
</body>
</html>
